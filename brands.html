<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands</title>
    <style>
        :root{
  --bg:#0a0a0a;
  --surface:#111;
  --card:#181818;
  --card2:#1e1e1e;
  --accent:#e8c97e;
  --accent2:#c8a84b;
  --accent-dim:rgba(232,201,126,0.12);
  --text:#f0ebe0;
  --muted:#777;
  --muted2:#555;
  --border:#222;
  --border2:#2e2e2e;
}


    *{
       margin: 0;
       padding: 0;
       box-sizing: border-box;
       font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    }
    body{
        background-image: url(images/imgeback.png);
        background-size: cover;
        backdrop-filter: blur(5px);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        

    }
    .main{
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-color: #c8a94b65;
        backdrop-filter: blur(50px);
        width: 90%;
        max-width: 540px;
        padding: 5px 4px;
        text-align: center;
        min-height: 480px;
        border: 0.5 solid gold;
        border-radius: 25px;
    }

    .plite{
        
        font-weight: bold;
        background-color:var(--accent2);
        padding: 5px;
        margin: 0px 60px;
        border-radius: 50px;
        border: 1px solid gray;
        font-size: 12px;
    }

    .plite span{
        animation: pop 8s ease-in-out infinite;
    }

    @keyframes pop{
        0%{
            opacity: 1;
            font-size: 8px;
            transition: all 0.5s;
        }
        50%{
            opacity: 0.5;
            font-size: 5px;
            transition: all 0.5s;
        }
        100%{
        opacity: 1;
        font-size: 8px;
        transition: all 0.5s;
        }
    }

    h1{
       font-size: 52px;
      font-weight: 600;
      letter-spacing: -2px;
      color: #111;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    h1 span{
        color: var(--accent2);
    }

    .ppp{
        font-size: 15px;
      color:var(--accent2);
      margin-bottom: 2.5rem;
      font-weight: 400;
    }

    .divhr{
        width: 40px;
      height: 1.5px;
      background: var(--bg);
      margin: 0 auto 2rem;
      border-radius: 2px;
    }

    input{
        flex: 1;
      height: 38px;
      border-radius: 8px 8px 8px 0px;
      border-top-left-radius: 0px;
      border: 0.5px solid rgba(0,0,0,0.18);
      padding: 0 12px;
      font-size: 14px;
      background: var(--border);
      color: #111;
      outline: none;
      font-family: inherit;
    }

    input:focus{border-color: var(--accent2);color:wheat;}

    .button{
        height: 38px;
      padding: 0 16px;
      background: var(--accent2);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
       border-radius: 8px 8px 0px 8px;
      border-top-right-radius: 0px;
    }

    .backpage{
        background-color: var(--border2);
        padding: 5px 20px;
        border-radius: 20px;
        margin-bottom: 5px;
        color: white;
        text-decoration: none;
        font-weight: bold;
        transition: all 0.5s;
        animation: pop1 1s ease-in-out infinite;
    }

    .backpage:hover{
        color: var(--accent2);
        background-color: var(--text);
    }

    @keyframes pop1{
        0%{
        }
        50%{
            box-shadow: 0px 0px 10px #e8c97e;
        }
        100%{

        }
    }
    </style>
</head>
<body>
    <div class="main">
        <a href="index.html" class="backpage">⇜BACK</a>
        <div class="form">
            <p class="plite">قريباَ <span> 🟢</span></p>
            <br>
            <h1>orvi<span>x</span></h1>
            <p class="ppp">شيء مميز قادم قريباً</p>
            <form>
                <div class="divhr"></div>
                <input type="button" class="button" onclick="sendEmail()" value="أبلغني">
                <input type="text" id="emailin" placeholder="enter your email...">
            </form>
        </div>
        <br>
                <label for="ssoon" id="soon" style="display: none; color: white;"> سنبلغك حين نطلق!</label>
                
        <br><br><br><br>
        <p class="cs-footer">© 2026 Orvix — جميع الحقوق محفوظة</p></div>
    </div>
    <script src="op.js"></script>

</body>
</html>
