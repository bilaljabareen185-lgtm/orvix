<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <title>login</title>
    <style>
     *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
     }

     body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(to right, #232526,#232526, #645811);
        
     }
     .login-card{
         background-color: rgb(255, 255, 255);
         width: 400px;
         padding: 40px;
         border-radius: 25px;
         box-shadow:0 10px 30px rgba(0,0,0,0.2);
     }
     
     label{
        display: block;
        margin-top:20px;
        margin-bottom:8px;
       font-weight:bold;
     

     }
     input{
        width: 100%;
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 12px;
        font-size: 18px;
     }
     button{
         width:100%;
    margin-top:30px;

    padding:15px;

    border:none;

    border-radius:12px;

    font-size:20px;
    font-weight:bold;

    color:white;

    cursor:pointer;

    background: linear-gradient(to right, #232526,#232526, #645811);
     }
     button:hover{
    opacity:0.9;
     }

     
    </style>
</head>
<body>
    <div class="login-card">
        
    <label for="email">Email</label>
    <input type="email" id="email"  name="email" placeholder="Enter Your Email">
    <label for="pass">Password</label>
    <input type="password" id="pass"  name="pass" placeholder="Enter Your Password">
    <button onclick="login()">Login</button>
    <p id="msg" style="color: red;font-weight: bold; margin-top: 5px;"></p>
 </div>
  <script src="op.js"></script>
</body>
</html>
